services:
  - type: web
    name: gohanpass-web-monitor-api
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: python run.py
    envVars:
      - key: NOTION_TOKEN
        sync: false
      - key: NOTION_DB_ID
        value: 5ad73fbd195182bcb4b201fb9d76815f
      - key: QA_CONSOLE_SHARED_SECRET
        sync: false
      - key: QA_CONSOLE_ALLOWED_ORIGIN
        value: https://gohanpass-qa-console.onrender.com
      - key: TIMEZONE
        value: Asia/Seoul
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 10000
